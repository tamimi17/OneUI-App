name: Ultimate Code Cleanup & Report

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      # تم استخدام الكاش لتسريع العملية
      - name: Cache Gradle packages and Distribution
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            gradle-9.3.1
          key: ${{ runner.os }}-gradle-9.3.1-v2-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-9.3.1-v2-

      - name: Download and Setup Gradle
        run: |
          if [ -d "gradle-9.3.1" ]; then
             echo "✅ Gradle 9.3.1 found in cache. Skipping download."
          else
             echo "⬇️ Gradle not found. Downloading..."
             wget https://services.gradle.org/distributions/gradle-9.3.1-bin.zip -O gradle_dist.zip
             unzip -q gradle_dist.zip
             rm gradle_dist.zip
          fi
          echo "$(pwd)/gradle-9.3.1/bin" >> $GITHUB_PATH

      # --- الإصلاح هنا ---
      # تمت إزالة "--gradle-version 9.3.1" لتجنب فحص الشبكة
      # وتمت إضافة "--no-daemon" لتوفير الذاكرة
      - name: Generate Gradle Wrapper
        run: ./gradle-9.3.1/bin/gradle wrapper --distribution-type all --no-daemon

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run OpenRewrite Cleanup
        run: |
          ./gradlew rewriteRun --info --stacktrace --no-daemon > cleanup_log.txt 2>&1 || true

      - name: Create Readable Summary
        run: |
          echo "### 🛠 Cleanup & Removal Report ###" > report.md
          echo "" >> report.md
          if grep -q "Changes have been made" cleanup_log.txt 2>/dev/null; then
            echo "✅ **Success:** Unused code was found and removed." >> report.md
          else
            echo "ℹ️ **Notice:** No changes were applied. This might be because the code is already clean or there were parsing issues." >> report.md
          fi
          cat report.md >> $GITHUB_STEP_SUMMARY

      - name: Commit Changes Safely
        run: |
          git config --global user.name "Cleanup-Bot"
          git config --global user.email "actions@github.com"
          
          # حذف مجلد الجرادل المحمل يدوياً لكي لا يتم رفعه (اختياري)
          rm -rf gradle-9.3.1/
          
          # إضافة ملفات الجافا المعدلة
          git add app/src/main/java/**/*.java || true
          git add app/build.gradle || true
          
          # (نصيحة) إذا كنت تريد حفظ ملفات الـ wrapper الجديدة في الريبو، قم بإلغاء تعليق الأسطر التالية:
          git add gradle/wrapper/
          git add gradlew gradlew.bat
          
          if ! git diff --staged --quiet; then
            git commit -m "refactor: cleanup unused code [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cleanup-logs
          path: cleanup_log.txt
